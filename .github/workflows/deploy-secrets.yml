name: Deploy Secrets to Key Vault

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (dev/staging/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy-secrets:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Azure Login
      uses: azure/login@v3
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Get Key Vault Name
      id: get-kv
      run: |
        KEY_VAULT_NAME=$(az deployment group show \
          --resource-group rg-az400-handson \
          --name main \
          --query properties.outputs.keyVaultName.value -o tsv)
        
        echo "keyvault_name=$KEY_VAULT_NAME" >> $GITHUB_OUTPUT
        echo "✅ Key Vault: $KEY_VAULT_NAME"
    
    - name: Set Database Connection String
      if: ${{ secrets.SQL_ADMIN_PASSWORD != '' }}
      env:
        DB_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        SQL_SERVER_FQDN: ${{ secrets.SQL_SERVER_FQDN }}
        SQL_DATABASE_NAME: ${{ secrets.SQL_DATABASE_NAME }}
        SQL_ADMIN_USER: ${{ secrets.SQL_ADMIN_USER }}
      run: |
        # SQL接続文字列を構築
        CONNECTION_STRING="Server=tcp:${SQL_SERVER_FQDN},1433;Database=${SQL_DATABASE_NAME};User ID=${SQL_ADMIN_USER};Password=${DB_PASSWORD};Encrypt=true;TrustServerCertificate=false;Connection Timeout=30;"
        
        # Key Vaultに設定（値を表示しない）
        az keyvault secret set \
          --vault-name "${{ steps.get-kv.outputs.keyvault_name }}" \
          --name DatabaseConnectionString \
          --value "$CONNECTION_STRING" \
          --output none
        
        echo "✅ DatabaseConnectionString を設定しました"
        
        # Managed Identity用（パスワード不要）
        CONNECTION_STRING_MI="Server=tcp:${SQL_SERVER_FQDN},1433;Database=${SQL_DATABASE_NAME};Authentication=Active Directory Default;Encrypt=true;"
        
        az keyvault secret set \
          --vault-name "${{ steps.get-kv.outputs.keyvault_name }}" \
          --name DatabaseConnectionStringMI \
          --value "$CONNECTION_STRING_MI" \
          --output none
        
        echo "✅ DatabaseConnectionStringMI を設定しました"
    
    - name: Set API Key
      if: ${{ secrets.API_KEY != '' }}
      env:
        API_KEY: ${{ secrets.API_KEY }}
      run: |
        az keyvault secret set \
          --vault-name "${{ steps.get-kv.outputs.keyvault_name }}" \
          --name ApiKey \
          --value "$API_KEY" \
          --output none
        
        echo "✅ ApiKey を設定しました"
    
    - name: Set Other Secrets
      if: ${{ secrets.EXTERNAL_API_TOKEN != '' }}
      env:
        EXTERNAL_API_TOKEN: ${{ secrets.EXTERNAL_API_TOKEN }}
      run: |
        az keyvault secret set \
          --vault-name "${{ steps.get-kv.outputs.keyvault_name }}" \
          --name ExternalApiToken \
          --value "$EXTERNAL_API_TOKEN" \
          --output none
        
        echo "✅ ExternalApiToken を設定しました"
    
    - name: Verify Secrets (without values)
      run: |
        echo "🔍 設定されたシークレット一覧（値は表示されません）:"
        az keyvault secret list \
          --vault-name "${{ steps.get-kv.outputs.keyvault_name }}" \
          --query "[].{Name:name, Enabled:attributes.enabled, Updated:attributes.updated}" \
          --output table
    
    - name: Security Summary
      run: |
        echo "✅ シークレット設定が完了しました"
        echo ""
        echo "🔒 セキュリティ確認:"
        echo "  ✓ シークレット値はログに出力されていません"
        echo "  ✓ GitHub Secretsから安全に注入されました"
        echo "  ✓ Key Vaultに暗号化して保存されました"
