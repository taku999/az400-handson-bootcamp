name: CD - GitHub Actions

on:
  workflow_run:
    workflows: ["CI - GitHub Actions"]
    types:
      - completed
    branches: [main]

env:
  AZURE_WEBAPP_NAME: 'az400-dev-webapp'
  RESOURCE_GROUP: 'rg-az400-handson'

jobs:
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment:
      name: development
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
    
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/az400webapp:${{ github.sha }}
      
      - name: Smoke test
        run: |
          sleep 30
          curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || exit 1
      
      - name: Notification
        if: always()
        run: |
          echo "Deployment to Development: ${{ job.status }}"
  
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: staging
      url: https://az400-staging-webapp.azurewebsites.net
    
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Staging Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'az400-staging-webapp'
          images: ${{ secrets.ACR_LOGIN_SERVER }}/az400webapp:${{ github.sha }}
      
      - name: Run integration tests
        run: |
          echo "Running integration tests..."
          sleep 30
          curl -f https://az400-staging-webapp.azurewebsites.net/health || exit 1
      
      - name: Notification
        if: always()
        run: |
          echo "Deployment to Staging: ${{ job.status }}"
  
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://az400-prod-webapp.azurewebsites.net
    
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Production Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'az400-prod-webapp'
          images: ${{ secrets.ACR_LOGIN_SERVER }}/az400webapp:${{ github.sha }}
      
      - name: Production smoke test
        run: |
          sleep 30
          curl -f https://az400-prod-webapp.azurewebsites.net/health || exit 1
      
      - name: Notify deployment
        run: |
          echo "🎉 Production deployment completed successfully!"
